name: Labeler

on:
  pull_request_target:
    branches:
      - main

permissions:
  contents: read

jobs:
  pr-labeler:
    name: Pull request
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Labeler
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
