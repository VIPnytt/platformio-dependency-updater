name: Labeler

on:
  pull_request_target:
    branches:
      - main

permissions:
  contents: read

jobs:
  pr-labeler:
    name: Pull request
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Labeler
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
